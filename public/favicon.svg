<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="w" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0d0d0a"/>

  <!-- Tree rings: outermost → innermost, with organic wobble -->
  <g filter="url(#w)" transform="translate(16,16)">
    <ellipse rx="13.5" ry="9.8"  fill="#1c0d03" stroke="#3a1906" stroke-width="0.6"/>
    <ellipse rx="10.8" ry="7.8"  fill="#341608" stroke="#62280d" stroke-width="0.6"/>
    <ellipse rx="8.2"  ry="5.9"  fill="#6b2c10" stroke="#9e4e1e" stroke-width="0.5"/>
    <ellipse rx="5.8"  ry="4.2"  fill="#c07038" stroke="#d48844" stroke-width="0.5"/>
    <ellipse rx="3.4"  ry="2.5"  fill="#d4a460" stroke="#e0bc80" stroke-width="0.4"/>
    <ellipse rx="1.5"  ry="1.1"  fill="#f0e8d5"/>
  </g>
</svg>
