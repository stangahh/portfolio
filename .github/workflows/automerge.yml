name: Automerge Dependabot

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to enable auto-merge on'
        required: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh pr merge --auto --merge "${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.inputs.pr-number }}"
          else
            gh pr merge --auto --merge "${{ github.event.pull_request.html_url }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
