services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - ASTRO_FILE_WATCHER_POLLING=true
      - ASTRO_TELEMETRY_DISABLED=true
    profiles:
      - dev

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    profiles:
      - prod
